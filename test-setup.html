<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Test Setup - Lukavac</title>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
  body { font-family: sans-serif; background: #fffff1; padding: 20px; max-width: 600px; margin: 0 auto; }
  h2 { color: #b75800; }
  button { background: linear-gradient(135deg,#b75800,#632705); color: white; border: none;
           border-radius: 10px; padding: 12px 24px; font-size: 1rem; cursor: pointer;
           margin: 8px 4px; width: 100%; }
  button:hover { opacity: .88; }
  button.green { background: linear-gradient(135deg,#10b981,#059669); }
  button.red   { background: linear-gradient(135deg,#ef4444,#b91c1c); }
  #log { background: white; border: 1.5px solid #ffd995; border-radius: 10px;
         padding: 12px; margin-top: 12px; font-size: .82rem; min-height: 80px;
         max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
</style>
</head>
<body>
<h2>🛠️ Lukavac Test Setup</h2>

<button onclick="shiftDates()">📅 Pomakni sve kvizove +10 dana</button>
<button class="green" onclick="addSataQuiz()">🕐 Dodaj Lukavac Sata (sljedeći puni sat)</button>
<button class="green" onclick="refreshSata()">🔄 Osvježi Sata na sljedeći sat</button>
<button class="red"   onclick="deleteSata()">🗑️ Obriši Sata kviz</button>

<div id="log">Čekam akciju...</div>

<script>
const db = firebase.database();
const log = m => { document.getElementById('log').textContent += '\n' + m; };

function getNextFullHour() {
    const now = new Date();
    const next = new Date(now);
    next.setMinutes(0, 0, 0);
    next.setHours(now.getHours() + 1);
    return next;
}

// Pomakni sve scheduledQuizzes +10 dana
async function shiftDates() {
    log('📅 Učitavam kvizove...');
    const snap = await db.ref('scheduledQuizzes').once('value');
    const quizzes = snap.val() || {};
    const shift = 10 * 24 * 60 * 60 * 1000;
    const updates = {};
    let count = 0;
    Object.entries(quizzes).forEach(([id, q]) => {
        if (q.startTime && id !== 'sata_test') {
            updates[`scheduledQuizzes/${id}/startTime`] = q.startTime + shift;
            updates[`scheduledQuizzes/${id}/status`] = 'scheduled';
            count++;
        }
    });
    if (count === 0) { log('⚠️ Nema kvizova za pomak.'); return; }
    await db.ref().update(updates);
    log(`✅ Pomaknuto ${count} kvizova za +10 dana.`);
}

// Dodaj Lukavac Sata kviz
async function addSataQuiz() {
    const next = getNextFullHour();
    log(`🕐 Dodajem Sata kviz za ${next.toLocaleString('hr-HR')}...`);

    const quiz = {
        name: 'Lukavac Sata',
        type: 'sata',
        startTime: next.getTime(),
        status: 'scheduled',
        locked: false,
        maxPlayers: 8,
        playerCount: 0,
        rounds: 5,
        questionsPerRound: 3,
        timeAnswer: 20,
        prizePool: 0,
        tokenCost: 0,
        roundSettings: [
            { questions:3, timeAnswer:20, values:[200,100,50,-50,-200] },
            { questions:3, timeAnswer:20, values:[400,200,100,-100,-400] },
            { questions:3, timeAnswer:20, values:[600,300,150,-150,-600] },
            { questions:3, timeAnswer:20, values:[1000,500,250,-250,-1000] },
            { questions:3, timeAnswer:20, values:[2000,1000,500,-500,-2000] }
        ],
        createdAt: Date.now()
    };

    await db.ref('scheduledQuizzes/sata_test').set(quiz);
    log(`✅ Sata kviz dodan za ${next.toLocaleTimeString('hr-HR', {hour:'2-digit',minute:'2-digit'})}`);
    log('🔓 Kviz je OTKLJUČAN (locked: false)');
}

// Osvježi Sata na sljedeći sat
async function refreshSata() {
    const next = getNextFullHour();
    log(`🔄 Osvježavam Sata na ${next.toLocaleString('hr-HR')}...`);
    await db.ref('scheduledQuizzes/sata_test').update({
        startTime: next.getTime(),
        status: 'scheduled',
        playerCount: 0
    });
    log('✅ Sata kviz osvježen!');
}

// Obriši Sata
async function deleteSata() {
    await db.ref('scheduledQuizzes/sata_test').remove();
    log('🗑️ Sata kviz obrisan.');
}
</script>
</body>
</html>
