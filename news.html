<!DOCTYPE html>
<!-- News / Notifications v1.0 -->
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novosti - Lukavac</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tillana:wght@400;500;600;700;800&family=Metal+Mania&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand:#b75800; --brand-dark:#632705; --brand-mid:#d97706;
            --brand-light:#ffd995; --brand-pale:#fffff1;
            --green:#10b981; --green-dark:#059669;
            --red:#ef4444; --card-shadow:0 4px 15px rgba(0,0,0,.13);

            /* notification type colours */
            --c-novost:#b75800;   --bg-novost:#fff8ee;   --bd-novost:#ffd995;
            --c-uputa:#3b82f6;    --bg-uputa:#dbeafe;    --bd-uputa:#93c5fd;
            --c-upozorenje:#d97706;--bg-upozorenje:#fef3c7;--bd-upozorenje:#fcd34d;
            --c-kviz:#7c3aed;     --bg-kviz:#ede9fe;     --bd-kviz:#c4b5fd;
            --c-uspjeh:#059669;   --bg-uspjeh:#d1fae5;   --bd-uspjeh:#6ee7b7;
            --c-liga:#0ea5e9;     --bg-liga:#e0f2fe;     --bd-liga:#7dd3fc;
            --c-nagrada:#d97706;  --bg-nagrada:#fef9c3;  --bd-nagrada:#fde047;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:linear-gradient(135deg,#e8c99a 0%,#b87333 50%,#e8c99a 100%);font-family:'Tillana','Segoe UI',sans-serif;min-height:100vh;}

        /* ── TOPBAR ── */
        .topbar{background:white;box-shadow:0 2px 12px rgba(0,0,0,.12);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:10px;}
        .topbar-left{display:flex;align-items:center;gap:10px;}
        .topbar-title{font-family:'Metal Mania',cursive;font-size:1.3rem;color:var(--brand);}
        .unread-badge{background:var(--red);color:white;border-radius:20px;padding:1px 9px;font-family:'Metal Mania',cursive;font-size:.72rem;display:none;}
        .topbar-back{background:var(--brand-pale);border:1.5px solid var(--brand-light);border-radius:10px;padding:6px 14px;font-size:.82rem;font-weight:700;color:var(--brand);cursor:pointer;text-decoration:none;white-space:nowrap;}
        .topbar-back:hover{background:var(--brand-light);}

        /* ── LAYOUT ── */
        .page-wrap{max-width:720px;margin:0 auto;padding:14px 12px 60px;}

        /* ── STATS BAR ── */
        .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
        .sbox{background:linear-gradient(135deg,var(--brand-pale),var(--brand-light));border:1.5px solid var(--brand);border-radius:13px;padding:9px 4px 10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.07);position:relative;overflow:hidden;}
        .sbox::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--brand-light),var(--brand),var(--brand-dark));}
        .sbox .sv{font-family:'Metal Mania',cursive;font-size:1.1rem;color:var(--brand);line-height:1;margin-bottom:2px;}
        .sbox .sl{font-family:'Metal Mania',cursive;font-size:.58rem;color:var(--brand-dark);letter-spacing:-.01em;}

        /* ── FILTER BAR ── */
        .filter-wrap{background:white;border-radius:14px;box-shadow:var(--card-shadow);padding:10px 12px;margin-bottom:10px;}
        .search-wrap{position:relative;margin-bottom:8px;}
        .search-input{width:100%;border:2px solid var(--brand-light);border-radius:12px;padding:9px 14px 9px 36px;font-family:'Tillana',sans-serif;font-size:.88rem;color:#1f2937;background:var(--brand-pale);}
        .search-input:focus{border-color:var(--brand);outline:none;background:white;}
        .si-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:.95rem;pointer-events:none;}
        .filter-chips{display:flex;flex-wrap:wrap;gap:5px;}
        .chip{padding:5px 13px;border-radius:20px;border:1.5px solid var(--brand-light);background:var(--brand-pale);font-family:'Metal Mania',cursive;font-size:.68rem;color:var(--brand-dark);cursor:pointer;transition:all .18s;white-space:nowrap;}
        .chip:hover{border-color:var(--brand);background:var(--brand-light);}
        .chip.active{background:linear-gradient(135deg,var(--brand-light),var(--brand));color:white;border-color:var(--brand);box-shadow:0 3px 8px rgba(183,88,0,.25);}
        .chip.c-uputa.active    {background:linear-gradient(135deg,#dbeafe,#3b82f6);border-color:#3b82f6;}
        .chip.c-upozorenje.active{background:linear-gradient(135deg,#fef3c7,#d97706);border-color:#d97706;}
        .chip.c-kviz.active     {background:linear-gradient(135deg,#ede9fe,#7c3aed);border-color:#7c3aed;}
        .chip.c-uspjeh.active   {background:linear-gradient(135deg,#d1fae5,#059669);border-color:#059669;}
        .chip.c-liga.active     {background:linear-gradient(135deg,#e0f2fe,#0ea5e9);border-color:#0ea5e9;}
        .chip.c-nagrada.active  {background:linear-gradient(135deg,#fef9c3,#d97706);border-color:#d97706;}
        .chip.c-unread.active   {background:linear-gradient(135deg,#fee2e2,#ef4444);border-color:#ef4444;color:white;}

        /* ── SECTION TITLE ── */
        .section-title{font-family:'Metal Mania',cursive;font-size:1rem;color:var(--brand);margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--brand);display:flex;align-items:center;gap:7px;}
        .cnt{background:var(--brand);color:white;border-radius:20px;padding:0 8px;font-size:.65rem;margin-left:auto;}

        /* ── MARK ALL / CLEAR BTNS ── */
        .action-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
        .act-btn{padding:6px 14px;border-radius:10px;border:1.5px solid var(--brand-light);background:var(--brand-pale);font-family:'Metal Mania',cursive;font-size:.68rem;color:var(--brand-dark);cursor:pointer;transition:all .18s;}
        .act-btn:hover{border-color:var(--brand);background:var(--brand-light);}
        .act-btn.danger{border-color:#fca5a5;color:#991b1b;}
        .act-btn.danger:hover{background:#fee2e2;border-color:#ef4444;}

        /* ── NOTIFICATION CARD ── */
        .notif-card{border-radius:14px;margin-bottom:8px;overflow:hidden;border:2px solid transparent;box-shadow:0 2px 10px rgba(0,0,0,.08);transition:transform .18s,box-shadow .18s,opacity .25s;}
        .notif-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.12);}
        .notif-card.read{opacity:.65;}

        .nc-stripe{height:4px;width:100%;}
        .nc-body{background:white;padding:11px 13px 10px;}

        /* stripes & colours per type */
        .t-novost    .nc-stripe{background:linear-gradient(90deg,var(--brand-light),var(--brand));}
        .t-novost    .nc-body  {border-left:4px solid var(--c-novost);}
        .t-uputa     .nc-stripe{background:linear-gradient(90deg,#bfdbfe,#3b82f6);}
        .t-uputa     .nc-body  {border-left:4px solid var(--c-uputa);background:#fafcff;}
        .t-upozorenje.nc-stripe,.t-upozorenje .nc-stripe{background:linear-gradient(90deg,#fde68a,#d97706);}
        .t-upozorenje .nc-body {border-left:4px solid var(--c-upozorenje);background:#fffef5;}
        .t-kviz      .nc-stripe{background:linear-gradient(90deg,#ddd6fe,#7c3aed);}
        .t-kviz      .nc-body  {border-left:4px solid var(--c-kviz);background:#fdfbff;}
        .t-uspjeh    .nc-stripe{background:linear-gradient(90deg,#a7f3d0,#059669);}
        .t-uspjeh    .nc-body  {border-left:4px solid var(--c-uspjeh);background:#fafffe;}
        .t-liga      .nc-stripe{background:linear-gradient(90deg,#bae6fd,#0ea5e9);}
        .t-liga      .nc-body  {border-left:4px solid var(--c-liga);background:#f7fbff;}
        .t-nagrada   .nc-stripe{background:linear-gradient(90deg,#fef08a,#ca8a04);}
        .t-nagrada   .nc-body  {border-left:4px solid var(--c-nagrada);background:#fffef0;}

        /* unread dot */
        .notif-card:not(.read) .nc-body{position:relative;}
        .notif-card:not(.read) .nc-body::before{content:'';position:absolute;top:14px;right:14px;width:8px;height:8px;border-radius:50%;background:var(--red);}

        .nc-head{display:flex;align-items:flex-start;gap:9px;}
        .nc-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
        .nc-info{flex:1;min-width:0;}
        .nc-type-label{font-family:'Metal Mania',cursive;font-size:.62rem;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
        .nc-title{font-family:'Metal Mania',cursive;font-size:1rem;color:#1f2937;margin-bottom:4px;line-height:1.15;}
        .nc-msg{font-size:.86rem;color:#374151;line-height:1.25;}
        .nc-footer{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap;}
        .nc-time{font-size:.64rem;color:#9ca3af;display:flex;align-items:center;gap:3px;}
        .nc-from{font-size:.62rem;color:#9ca3af;background:#f3f4f6;border-radius:6px;padding:1px 7px;}
        .nc-action{margin-left:auto;display:flex;gap:6px;}
        .nc-btn-read{background:none;border:1.5px solid #e5e7eb;border-radius:8px;padding:3px 10px;font-family:'Metal Mania',cursive;font-size:.64rem;color:#9ca3af;cursor:pointer;transition:all .18s;}
        .nc-btn-read:hover{border-color:var(--green);color:var(--green);}
        .nc-btn-del{background:none;border:1.5px solid #e5e7eb;border-radius:8px;padding:3px 10px;font-family:'Metal Mania',cursive;font-size:.64rem;color:#9ca3af;cursor:pointer;transition:all .18s;}
        .nc-btn-del:hover{border-color:var(--red);color:var(--red);}
        .nc-link{background:linear-gradient(135deg,var(--brand-light),var(--brand));color:white;border:none;border-radius:8px;padding:4px 12px;font-family:'Metal Mania',cursive;font-size:.66rem;cursor:pointer;text-decoration:none;display:inline-block;}

        /* ── EXPAND (long message) ── */
        .nc-msg.collapsed{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
        .expand-btn{font-size:.68rem;color:var(--brand);cursor:pointer;font-family:'Metal Mania',cursive;margin-top:4px;display:inline-block;}

        /* ── PINNED BANNER ── */
        .pinned-card{border:2px solid var(--brand);border-radius:16px;overflow:hidden;margin-bottom:14px;box-shadow:0 4px 15px rgba(183,88,0,.18);}
        .pinned-stripe{height:5px;background:linear-gradient(90deg,var(--brand-light),var(--brand),var(--brand-dark));}
        .pinned-body{background:linear-gradient(135deg,var(--brand-pale),#fff8e6);padding:14px 16px;}
        .pinned-label{font-family:'Metal Mania',cursive;font-size:.65rem;color:var(--brand);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
        .pinned-title{font-family:'Metal Mania',cursive;font-size:1rem;color:var(--brand-dark);margin-bottom:5px;}
        .pinned-msg{font-size:.84rem;color:#4b5563;line-height:1.25;}
        .pinned-foot{margin-top:9px;display:flex;align-items:center;gap:10px;font-size:.65rem;color:#9ca3af;}

        /* ── EMPTY / SPINNER ── */
        .empty-msg{text-align:center;color:#9ca3af;padding:36px 10px;font-size:.88rem;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .spinner{width:26px;height:26px;border:3px solid var(--brand-light);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
        .fu{animation:fadeUp .22s ease;}

        /* ── TOAST ── */
        #toast{position:fixed;bottom:24px;right:16px;z-index:999;background:#1f2937;color:white;border-radius:12px;padding:10px 16px;font-size:.82rem;display:none;box-shadow:0 8px 24px rgba(0,0,0,.25);}

        @media(max-width:480px){
            .stats-bar{grid-template-columns:repeat(2,1fr);}
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <div class="topbar-title">📰 NOVOSTI</div>
        <span class="unread-badge" id="topbar-badge">0</span>
    </div>
    <a href="dashboard.html" class="topbar-back">← Dashboard</a>
</div>

<div class="page-wrap">

    <!-- STATS -->
    <div class="stats-bar">
        <div class="sbox">
            <div class="sv" id="stat-total">—</div>
            <div class="sl">📨 Ukupno</div>
        </div>
        <div class="sbox" style="border-color:#fca5a5;">
            <div class="sv" style="color:var(--red);" id="stat-unread">—</div>
            <div class="sl">🔴 Nepročitano</div>
        </div>
        <div class="sbox" style="border-color:#bfdbfe;">
            <div class="sv" style="color:#3b82f6;" id="stat-uputa">—</div>
            <div class="sl">📘 Upute</div>
        </div>
        <div class="sbox" style="border-color:#ddd6fe;">
            <div class="sv" style="color:#7c3aed;" id="stat-kviz">—</div>
            <div class="sl">🎮 Kvizovi</div>
        </div>
    </div>

    <!-- PINNED (filled from broadcast/pinned node) -->
    <div id="pinned-wrap"></div>

    <!-- FILTERS -->
    <div class="filter-wrap">
        <div class="search-wrap">
            <span class="si-icon">🔍</span>
            <input type="text" class="search-input" id="search-input" placeholder="Pretraži obavijesti..." oninput="render()">
        </div>
        <div class="filter-chips">
            <button class="chip active"         onclick="setFilter('sve',this)">📨 Sve</button>
            <button class="chip c-unread"       onclick="setFilter('unread',this)">🔴 Nepročitane</button>
            <button class="chip c-novost"       onclick="setFilter('novost',this)">📰 Novosti</button>
            <button class="chip c-uputa"        onclick="setFilter('uputa',this)">📘 Upute</button>
            <button class="chip c-upozorenje"   onclick="setFilter('upozorenje',this)">⚠️ Upozorenja</button>
            <button class="chip c-kviz"         onclick="setFilter('kviz',this)">🎮 Kvizovi</button>
            <button class="chip c-liga"         onclick="setFilter('liga',this)">🏅 Lige</button>
            <button class="chip c-nagrada"      onclick="setFilter('nagrada',this)">🏆 Nagrade</button>
            <button class="chip c-uspjeh"       onclick="setFilter('uspjeh',this)">✅ Uspjeh</button>
        </div>
    </div>

    <!-- ACTIONS -->
    <div class="action-row">
        <button class="act-btn" onclick="markAllRead()">✅ Označi sve pročitano</button>
        <button class="act-btn danger" onclick="clearRead()">🗑️ Obriši pročitane</button>
        <span style="font-family:'Metal Mania',cursive;font-size:.68rem;color:#9ca3af;align-self:center;margin-left:auto;" id="sort-label">Najnovije prvo</span>
    </div>

    <!-- LIST -->
    <div class="section-title">
        🔔 Obavijesti
        <span class="cnt" id="list-count">0</span>
    </div>
    <div id="notif-list">
        <div style="text-align:center;padding:30px;">
            <div class="spinner"></div>
            <div style="color:#9ca3af;font-size:.85rem;margin-top:4px;">Učitavam obavijesti...</div>
        </div>
    </div>

</div><!-- /page-wrap -->

<div id="toast"></div>

<script>
const playerProfileId = sessionStorage.getItem('playerProfileId');
const playerProfile   = JSON.parse(sessionStorage.getItem('playerProfile') || 'null');

// ── TYPE CONFIG ────────────────────────────────────────
const TYPES = {
    novost:     { icon:'📰', label:'Novost',      color:'var(--c-novost)',      bg:'#fff8ee', iconBg:'#fef3c7' },
    uputa:      { icon:'📘', label:'Uputa',       color:'var(--c-uputa)',       bg:'#fafcff', iconBg:'#dbeafe' },
    upozorenje: { icon:'⚠️', label:'Upozorenje',  color:'var(--c-upozorenje)', bg:'#fffef5', iconBg:'#fef3c7' },
    kviz:       { icon:'🎮', label:'Kviz',        color:'var(--c-kviz)',        bg:'#fdfbff', iconBg:'#ede9fe' },
    uspjeh:     { icon:'✅', label:'Uspjeh',      color:'var(--c-uspjeh)',      bg:'#fafffe', iconBg:'#d1fae5' },
    liga:       { icon:'🏅', label:'Liga',        color:'var(--c-liga)',        bg:'#f7fbff', iconBg:'#e0f2fe' },
    nagrada:    { icon:'🏆', label:'Nagrada',     color:'var(--c-nagrada)',     bg:'#fffef0', iconBg:'#fef9c3' },
    // backwards compat with dashboard types
    info:       { icon:'ℹ️', label:'Informacija', color:'var(--c-uputa)',       bg:'#fafcff', iconBg:'#dbeafe' },
    warning:    { icon:'⚠️', label:'Upozorenje',  color:'var(--c-upozorenje)', bg:'#fffef5', iconBg:'#fef3c7' },
    success:    { icon:'✅', label:'Uspjeh',      color:'var(--c-uspjeh)',      bg:'#fafffe', iconBg:'#d1fae5' },
    default:    { icon:'🔔', label:'Obavijest',   color:'var(--c-novost)',      bg:'#fff8ee', iconBg:'#fef3c7' },
};

// normalise old dashboard types → new type names
function normaliseType(t) {
    if (!t) return 'novost';
    if (t === 'info')    return 'uputa';
    if (t === 'warning') return 'upozorenje';
    if (t === 'success') return 'uspjeh';
    return t;
}

let allNotifs  = [];   // [{id, ...data}]
let activeFilter = 'sve';

// ── INIT ──────────────────────────────────────────────
window.onload = function() {
    if (!playerProfileId) {
        document.getElementById('notif-list').innerHTML = '<div class="empty-msg">Nisi prijavljen.<br><a href="index.html" style="color:var(--brand);">→ Prijavi se</a></div>';
        return;
    }

    // Pinned broadcast
    database.ref('broadcastPinned').once('value').then(snap => {
        const p = snap.val();
        if (p && p.message) renderPinned(p);
    });

    // Personal notifications (real-time)
    database.ref('notifications/' + playerProfileId)
        .orderByChild('timestamp')
        .on('value', snap => {
            const raw = snap.val() || {};
            allNotifs = Object.entries(raw)
                .map(([id, d]) => ({ id, ...d }))
                .sort((a, b) => b.timestamp - a.timestamp);
            updateStats();
            render();
        });
};

// ── PINNED BROADCAST ──────────────────────────────────
function renderPinned(p) {
    const t    = TYPES[normaliseType(p.type)] || TYPES.novost;
    const date = p.timestamp ? relTime(p.timestamp) : '';
    document.getElementById('pinned-wrap').innerHTML =
        '<div class="pinned-card fu">'
        + '<div class="pinned-stripe"></div>'
        + '<div class="pinned-body">'
        + '<div class="pinned-label">📌 Prikvačena Obavijest</div>'
        + (p.title ? '<div class="pinned-title">' + esc(p.title) + '</div>' : '')
        + '<div class="pinned-msg">' + esc(p.message) + '</div>'
        + '<div class="pinned-foot">'
        + '<span>' + t.icon + ' ' + t.label + '</span>'
        + (date ? '<span>🕐 ' + date + '</span>' : '')
        + (p.from ? '<span>od: ' + esc(p.from) + '</span>' : '')
        + (p.link ? '<a href="' + p.link + '" class="nc-link" style="margin-left:auto;">→ Saznaj više</a>' : '')
        + '</div>'
        + '</div></div>';
}

// ── STATS ──────────────────────────────────────────────
function updateStats() {
    const unread = allNotifs.filter(n => !n.read).length;
    const upute  = allNotifs.filter(n => normaliseType(n.type) === 'uputa').length;
    const kvizovi= allNotifs.filter(n => normaliseType(n.type) === 'kviz').length;

    document.getElementById('stat-total').textContent  = allNotifs.length;
    document.getElementById('stat-unread').textContent = unread;
    document.getElementById('stat-uputa').textContent  = upute;
    document.getElementById('stat-kviz').textContent   = kvizovi;

    const badge = document.getElementById('topbar-badge');
    badge.textContent = unread > 0 ? unread : '';
    badge.style.display = unread > 0 ? 'inline' : 'none';

    // Sync back to dashboard badge too
    try {
        const topBadge = document.querySelector('.notif-dash-badge');
        if (topBadge) topBadge.textContent = unread;
    } catch(e){}
}

// ── FILTER ────────────────────────────────────────────
function setFilter(f, el) {
    activeFilter = f;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    render();
}

// ── RENDER ────────────────────────────────────────────
function render() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    let list = allNotifs.filter(n => {
        const type = normaliseType(n.type);
        if (activeFilter === 'unread' && n.read) return false;
        if (activeFilter !== 'sve' && activeFilter !== 'unread' && type !== activeFilter) return false;
        if (q && !(n.message || '').toLowerCase().includes(q) && !(n.title || '').toLowerCase().includes(q)) return false;
        return true;
    });

    document.getElementById('list-count').textContent = list.length;

    if (!list.length) {
        document.getElementById('notif-list').innerHTML =
            '<div class="empty-msg">😕 Nema obavijesti za ovaj filter</div>';
        return;
    }

    document.getElementById('notif-list').innerHTML = list.map(n => renderCard(n)).join('');
}

function renderCard(n) {
    const type  = normaliseType(n.type);
    const t     = TYPES[type] || TYPES.default;
    const date  = relTime(n.timestamp);
    const full  = date + (n.timestamp ? ' · ' + absTime(n.timestamp) : '');
    const readCls = n.read ? 'read' : '';
    const msgFull = esc(n.message || '');
    const needsClamp = (n.message || '').length > 180;
    const msgHtml = needsClamp
        ? '<div class="nc-msg collapsed" id="msg-' + n.id + '">' + msgFull + '</div>'
          + '<span class="expand-btn" onclick="expand(\'' + n.id + '\',this)">▼ Prikaži više</span>'
        : '<div class="nc-msg">' + msgFull + '</div>';

    return '<div class="notif-card t-' + type + ' ' + readCls + ' fu" id="ncard-' + n.id + '">'
        + '<div class="nc-stripe"></div>'
        + '<div class="nc-body">'
        + '<div class="nc-head">'
        + '<div class="nc-icon" style="background:' + t.iconBg + ';">' + t.icon + '</div>'
        + '<div class="nc-info">'
        + '<div class="nc-type-label" style="color:' + t.color + ';">' + t.label + '</div>'
        + (n.title ? '<div class="nc-title">' + esc(n.title) + '</div>' : '')
        + msgHtml
        + '<div class="nc-footer">'
        + '<span class="nc-time">🕐 ' + full + '</span>'
        + (n.from && n.from !== 'system' ? '<span class="nc-from">od: ' + esc(n.from) + '</span>' : '')
        + '<div class="nc-action">'
        + (!n.read ? '<button class="nc-btn-read" onclick="markRead(\'' + n.id + '\')">✓ Pročitano</button>' : '')
        + (n.link ? '<a href="' + n.link + '" class="nc-link">→ Otvori</a>' : '')
        + '<button class="nc-btn-del" onclick="delNotif(\'' + n.id + '\')">✕</button>'
        + '</div>'
        + '</div>'
        + '</div>'
        + '</div>'
        + '</div>'
        + '</div>';
}

// ── ACTIONS ───────────────────────────────────────────
function markRead(id) {
    database.ref('notifications/' + playerProfileId + '/' + id + '/read').set(true);
    const card = document.getElementById('ncard-' + id);
    if (card) card.classList.add('read');
    const btn = card ? card.querySelector('.nc-btn-read') : null;
    if (btn) btn.remove();
    // update local
    const n = allNotifs.find(x => x.id === id);
    if (n) n.read = true;
    updateStats();
}

function delNotif(id) {
    database.ref('notifications/' + playerProfileId + '/' + id).remove();
    const card = document.getElementById('ncard-' + id);
    if (card) { card.style.opacity = '0'; card.style.transform = 'translateX(30px)'; setTimeout(() => card.remove(), 250); }
    allNotifs = allNotifs.filter(n => n.id !== id);
    updateStats();
    document.getElementById('list-count').textContent = document.querySelectorAll('.notif-card').length;
}

function markAllRead() {
    const unread = allNotifs.filter(n => !n.read);
    if (!unread.length) { toast('Sve je već pročitano ✅'); return; }
    const updates = {};
    unread.forEach(n => { updates[n.id + '/read'] = true; });
    database.ref('notifications/' + playerProfileId).update(updates).then(() => {
        toast('✅ Sve označeno kao pročitano');
    });
}

function clearRead() {
    const read = allNotifs.filter(n => n.read);
    if (!read.length) { toast('Nema pročitanih za brisanje'); return; }
    if (!confirm('Obrisati ' + read.length + ' pročitanih obavijesti?')) return;
    const updates = {};
    read.forEach(n => { updates[n.id] = null; });
    database.ref('notifications/' + playerProfileId).update(updates).then(() => {
        toast('🗑️ Pročitane obavijesti obrisane');
    });
}

function expand(id, btn) {
    const el = document.getElementById('msg-' + id);
    if (!el) return;
    el.classList.remove('collapsed');
    btn.remove();
}

// ── HELPERS ───────────────────────────────────────────
function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function relTime(ts) {
    if (!ts) return '—';
    const diff = Date.now() - ts;
    const m = Math.floor(diff / 60000);
    if (m < 1)  return 'Upravo';
    if (m < 60) return 'Prije ' + m + ' min';
    const h = Math.floor(m / 60);
    if (h < 24) return 'Prije ' + h + 'h';
    const d = Math.floor(h / 24);
    if (d < 7)  return 'Prije ' + d + 'd';
    return absTime(ts);
}

function absTime(ts) {
    return new Date(ts).toLocaleString('hr-HR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2800);
}
</script>
