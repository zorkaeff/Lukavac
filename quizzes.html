<!DOCTYPE html>
<!-- Quizzes v2.0 -->
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kvizovi - Lukavac</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tillana:wght@400;500;600;700;800&family=Metal+Mania&display=swap" rel="stylesheet">
    <style>
        :root{ --brand:#b75800; --brand-dark:#632705; --brand-mid:#d97706; --brand-light:#ffd995; --brand-pale:#fffff1; --card-shadow:0 4px 15px rgba(0,0,0,.13); }
        *{ box-sizing:border-box; margin:0; padding:0; }
        body{ background:linear-gradient(135deg,#e8c99a 0%,#b87333 50%,#e8c99a 100%); font-family:'Tillana','Segoe UI',sans-serif; min-height:100vh; }
        .topbar{ background:white; box-shadow:0 2px 12px rgba(0,0,0,.12); padding:10px 14px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; gap:10px; }
        .topbar-title{ font-family:'Metal Mania',cursive; font-size:1.3rem; color:var(--brand); }
        .topbar-back{ background:var(--brand-pale); border:1.5px solid var(--brand-light); border-radius:10px; padding:7px 15px; font-size:.85rem; font-weight:700; color:var(--brand); cursor:pointer; text-decoration:none; white-space:nowrap; }
        .topbar-back:hover{ background:var(--brand-light); }
        .page-wrap{ max-width:720px; margin:0 auto; padding:12px 12px 60px; }
        /* STAT CARDS */
        .stat-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:8px; }
        .stat-card{ background:linear-gradient(135deg,var(--brand-pale) 0%,var(--brand-light) 100%); border:1px solid var(--brand); border-radius:12px; padding:11px 4px 12px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,.07); position:relative; overflow:hidden; }
        .stat-card::after{ content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--brand-light),var(--brand),var(--brand-dark)); }
        .stat-value{ font-family:'Metal Mania',cursive; font-size:1.5rem; color:var(--brand); line-height:1; margin-bottom:4px; }
        .stat-label{ font-family:'Metal Mania',cursive; font-size:.82rem; color:var(--brand-dark); line-height:1.1; }
        /* SEARCH */
        .search-wrap{ background:white; border-radius:14px; box-shadow:var(--card-shadow); padding:10px 12px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
        .search-input{ flex:1; border:2px solid var(--brand-light); border-radius:11px; padding:10px 14px; font-family:'Tillana',sans-serif; font-size:1rem; color:#1f2937; background:var(--brand-pale); transition:border-color .2s; }
        .search-input:focus{ border-color:var(--brand); outline:none; background:white; }
        .search-input::placeholder{ color:#9ca3af; }
        /* FILTER */
        .filter-bar{ background:white; border-radius:14px; box-shadow:var(--card-shadow); padding:10px 12px; margin-bottom:8px; display:flex; gap:6px; flex-wrap:wrap; }
        .fchip{ padding:7px 15px; border-radius:20px; border:1.5px solid var(--brand-light); background:var(--brand-pale); font-family:'Metal Mania',cursive; font-size:.78rem; color:var(--brand-dark); cursor:pointer; white-space:nowrap; transition:all .18s; }
        .fchip:hover{ border-color:var(--brand); background:var(--brand-light); }
        .fchip.active{ background:linear-gradient(135deg,var(--brand-light),var(--brand)); color:white; border-color:var(--brand); box-shadow:0 3px 10px rgba(183,88,0,.22); }
        .fchip.live-chip.active{ background:linear-gradient(135deg,#fca5a5,#ef4444); border-color:#ef4444; }
        .fchip.nadolazeci-chip.active{ background:linear-gradient(135deg,#bfdbfe,#3b82f6); border-color:#3b82f6; }
        .fchip.prijavljeni-chip.active{ background:linear-gradient(135deg,#a7f3d0,#10b981); border-color:#10b981; }
        /* SORT BAR */
        .sort-bar{ background:white; border-radius:14px; box-shadow:var(--card-shadow); padding:9px 12px; margin-bottom:10px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .sort-label{ font-family:'Metal Mania',cursive; font-size:.78rem; color:var(--brand-dark); white-space:nowrap; }
        .sort-btn{ padding:5px 13px; border-radius:20px; border:1.5px solid var(--brand-light); background:var(--brand-pale); font-family:'Metal Mania',cursive; font-size:.72rem; color:var(--brand-dark); cursor:pointer; white-space:nowrap; transition:all .18s; display:flex; align-items:center; gap:4px; }
        .sort-btn:hover{ border-color:var(--brand); background:var(--brand-light); }
        .sort-btn.active{ background:linear-gradient(135deg,var(--brand-pale),var(--brand-light)); border-color:var(--brand); color:var(--brand-dark); font-weight:700; }
        .sort-arrow{ font-size:.65rem; }
        /* SEC TITLE */
        .sec-title{ font-family:'Metal Mania',cursive; font-size:1.05rem; color:var(--brand); margin-bottom:8px; padding-bottom:7px; border-bottom:3px solid var(--brand); display:flex; align-items:center; gap:7px; }
        /* QUIZ ITEM */
        /* ── QUIZ CARDS ── */
        .quiz-item{ background:white; border-radius:20px; box-shadow:0 4px 20px rgba(183,88,0,.13); margin-bottom:14px; overflow:hidden; border:2px solid var(--brand-light); transition:transform .18s,box-shadow .18s; cursor:pointer; }
        .quiz-item:hover{ transform:translateY(-3px); box-shadow:0 10px 30px rgba(183,88,0,.22); }
        .quiz-item.qlive{ border-color:#10b981; border-width:2px; box-shadow:0 0 0 3px rgba(16,185,129,.18); }
        .quiz-item.qfin{ opacity:.58; }
        /* top coloured band per type */
        .quiz-band{ height:6px; }
        .qi-sata   .quiz-band{ background:linear-gradient(90deg,#3b82f6,#93c5fd); }
        .qi-dana   .quiz-band{ background:linear-gradient(90deg,#8b5cf6,#c4b5fd); }
        .qi-tjedna .quiz-band{ background:linear-gradient(90deg,#f59e0b,#fde68a); }
        .qi-mjeseca .quiz-band{ background:linear-gradient(90deg,var(--brand),var(--brand-light)); }
        .qi-premium .quiz-band{ background:linear-gradient(90deg,#ca8a04,#fef08a); }
        .qi-live   .quiz-band{ background:linear-gradient(90deg,#10b981,#a7f3d0); }
        .qi-default .quiz-band{ background:linear-gradient(90deg,var(--brand-light),var(--brand)); }
        /* header row: icon + name + countdown */
        .quiz-head{ padding:14px 14px 10px; display:flex; align-items:flex-start; gap:12px; }
        .quiz-type-icon{ width:50px; height:50px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:1.7rem; flex-shrink:0; }
        .qi-sata   .quiz-type-icon{ background:linear-gradient(135deg,#dbeafe,#3b82f6); }
        .qi-dana   .quiz-type-icon{ background:linear-gradient(135deg,#ede9fe,#8b5cf6); }
        .qi-tjedna .quiz-type-icon{ background:linear-gradient(135deg,#fef3c7,#f59e0b); }
        .qi-mjeseca .quiz-type-icon{ background:linear-gradient(135deg,var(--brand-pale),var(--brand)); }
        .qi-premium .quiz-type-icon{ background:linear-gradient(135deg,#fef9c3,#ca8a04); }
        .qi-live   .quiz-type-icon{ background:linear-gradient(135deg,#d1fae5,#10b981); }
        .qi-default .quiz-type-icon{ background:linear-gradient(135deg,var(--brand-pale),var(--brand-light)); }
        .quiz-info{ flex:1; min-width:0; }
        .quiz-name{ font-family:'Metal Mania',cursive; font-size:1.3rem; color:var(--brand-dark); line-height:1.15; margin-bottom:4px; }
        .quiz-time{ font-size:.8rem; color:#9ca3af; margin-bottom:8px; }
        /* pills row */
        .quiz-pills{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
        .qpill{ background:var(--brand-pale); border:1.5px solid var(--brand-light); border-radius:20px; padding:4px 12px; font-family:'Metal Mania',cursive; font-size:.78rem; color:var(--brand-dark); white-space:nowrap; }
        .qpill.green{ background:#d1fae5; border-color:#a7f3d0; color:#065f46; }
        .qpill.blue{ background:#dbeafe; border-color:#bfdbfe; color:#1e40af; }
        .qpill.gold{ background:#fef9c3; border-color:#fde68a; color:#92400e; }
        /* countdown — big, top-right */
        .cd-block{ display:flex; flex-direction:column; align-items:flex-end; flex-shrink:0; gap:4px; }
        .cd-wrap{ font-family:'Metal Mania',cursive; font-size:1rem; color:white; background:linear-gradient(135deg,var(--brand),var(--brand-dark)); border-radius:12px; padding:6px 12px; white-space:nowrap; line-height:1.2; box-shadow:0 3px 10px rgba(183,88,0,.3); }
        .cd-wrap.cd-urgent{ background:linear-gradient(135deg,#dc2626,#991b1b); animation:cdPulse 1.2s ease-in-out infinite; }
        @keyframes cdPulse{ 0%,100%{ box-shadow:0 3px 10px rgba(220,38,38,.4); } 50%{ box-shadow:0 3px 20px rgba(220,38,38,.7); } }
        .quiz-badge{ font-family:'Metal Mania',cursive; font-size:.72rem; border-radius:8px; padding:4px 11px; white-space:nowrap; }
        .qb-live{ background:#10b981; color:white; }
        .qb-sched{ background:#3b82f6; color:white; }
        .qb-fin{ background:#9ca3af; color:white; }
        /* footer with stats + action button */
        .quiz-foot{ background:var(--brand-pale); border-top:2px solid var(--brand-light); padding:11px 14px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
        .quiz-foot-stats{ display:flex; gap:10px; flex-wrap:wrap; }
        .quiz-foot-stats span{ font-family:'Metal Mania',cursive; font-size:.82rem; color:var(--brand-dark); }
        .btn-join{ padding:9px 20px; border:none; border-radius:12px; font-family:'Metal Mania',cursive; font-size:.9rem; cursor:pointer; white-space:nowrap; transition:all .18s; }
        .btn-join.live-btn{ background:linear-gradient(135deg,#34d399,#10b981); color:white; box-shadow:0 3px 12px rgba(16,185,129,.35); }
        .btn-join.join-btn{ background:linear-gradient(135deg,var(--brand-light),var(--brand)); color:white; box-shadow:0 3px 12px rgba(183,88,0,.3); }
        .btn-join.reg-btn{ background:linear-gradient(135deg,#a7f3d0,#059669); color:white; }
        .btn-join.fin-btn{ background:#f3f4f6; color:#9ca3af; cursor:default; }
        @keyframes liveDot{ 0%,100%{ opacity:1;transform:scale(1); } 50%{ opacity:.25;transform:scale(1.6); } }
        .live-dot-r{ width:9px;height:9px;background:#ef4444;border-radius:50%;display:inline-block;animation:liveDot 1.2s infinite;margin-right:4px;vertical-align:middle; }
        .empty-state{ text-align:center; padding:32px 16px; color:#9ca3af; }
        .empty-icon{ font-size:3rem; margin-bottom:10px; }
        .empty-text{ font-family:'Metal Mania',cursive; font-size:.95rem; }
        @keyframes fadeUp{ from{ opacity:0;transform:translateY(8px); } to{ opacity:1;transform:translateY(0); } }
        .fu{ animation:fadeUp .22s ease; }
        @keyframes spin{ to{ transform:rotate(360deg); } }
        .spinner{ width:22px;height:22px;border:3px solid var(--brand-light);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px; }
        #toast{ position:fixed;bottom:24px;right:16px;z-index:999;background:#1f2937;color:white;border-radius:12px;padding:11px 17px;font-size:.88rem;display:none;box-shadow:0 8px 24px rgba(0,0,0,.25); }
        /* MODAL */
        .modal-overlay{ position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:flex-end;justify-content:center; }
        .modal-overlay.open{ display:flex; }
        .modal{ background:white;border-radius:24px 24px 0 0;padding:0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto; }
        @keyframes slideUp{ from{ transform:translateY(100%); } to{ transform:translateY(0); } }
        .modal.open{ animation:slideUp .25s ease; }
        .modal-handle{ width:40px;height:4px;background:#e5e7eb;border-radius:4px;margin:12px auto 0; }
        .modal-head{ padding:14px 18px 12px;border-bottom:2px solid var(--brand-light); }
        .modal-title{ font-family:'Metal Mania',cursive;font-size:1.1rem;color:var(--brand); }
        .modal-body{ padding:16px 18px 20px; }
        .m-label{ font-family:'Metal Mania',cursive;font-size:.8rem;color:var(--brand-dark);margin-bottom:5px;display:block; }
        .m-input{ width:100%;border:2px solid var(--brand-light);border-radius:11px;padding:11px 14px;font-family:'Tillana',sans-serif;font-size:1rem;color:#1f2937;background:var(--brand-pale);margin-bottom:10px;letter-spacing:.15em;text-align:center;transition:border-color .2s; }
        .m-input:focus{ border-color:var(--brand);outline:none;background:white; }
        .btn-primary{ width:100%;padding:13px;background:linear-gradient(135deg,var(--brand-light),var(--brand));color:white;border:none;border-radius:12px;font-family:'Metal Mania',cursive;font-size:.95rem;cursor:pointer;box-shadow:0 4px 14px rgba(183,88,0,.3);transition:all .2s; }
        .btn-primary:hover{ transform:translateY(-1px); }
        .btn-cancel{ width:100%;padding:10px;background:transparent;border:1.5px solid var(--brand-light);border-radius:11px;font-family:'Metal Mania',cursive;font-size:.82rem;color:#9ca3af;cursor:pointer;margin-top:8px; }
        .quiz-detail-grid{ display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px; }
        .qdg-cell{ background:var(--brand-pale);border:1.5px solid var(--brand-light);border-radius:11px;padding:9px 12px;text-align:center; }
        .qdg-val{ font-family:'Metal Mania',cursive;font-size:1.1rem;color:var(--brand); }
        .qdg-lbl{ font-size:.72rem;color:#9ca3af;margin-top:2px; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-title">🎮 KVIZOVI</div>
    <a href="dashboard.html" class="topbar-back">← Dashboard</a>
</div>

<div class="page-wrap">

    <!-- STAT CARDS - kviz statistike -->
    <div class="stat-row fu">
        <div class="stat-card">
            <div class="stat-value" style="color:#ef4444;" id="statLive">0</div>
            <div class="stat-label">Uživo</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" style="color:#3b82f6;" id="statUskoro">0</div>
            <div class="stat-label">Uskoro</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" style="color:#10b981;" id="statPrijava">0</div>
            <div class="stat-label">Prijava</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" style="color:var(--brand);" id="statUkupno">0</div>
            <div class="stat-label">Ukupno</div>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="search-wrap fu">
        <span style="font-size:1.2rem;">🔍</span>
        <input type="text" class="search-input" id="search-input" placeholder="Pretraži kvizove..." oninput="renderQuizzes()">
    </div>

    <!-- FILTER CHIPS - sve u redovima, flex-wrap -->
    <div class="filter-bar fu">
        <button class="fchip active"              onclick="setFilter('sve',this)">🎮 Svi</button>
        <button class="fchip live-chip"           onclick="setFilter('live',this)">🔴 Uživo</button>
        <button class="fchip nadolazeci-chip"     onclick="setFilter('nadolazeci',this)">📅 Nadolazeći</button>
        <button class="fchip prijavljeni-chip"    onclick="setFilter('prijavljeni',this)">✅ Prijavljeni</button>
        <button class="fchip"                     onclick="setFilter('sata',this)">🕐 Sata</button>
        <button class="fchip"                     onclick="setFilter('dana',this)">🌙 Dana</button>
        <button class="fchip"                     onclick="setFilter('tjedna',this)">📆 Tjedna</button>
        <button class="fchip"                     onclick="setFilter('mjeseca',this)">🗓️ Mjeseca</button>
        <button class="fchip"                     onclick="setFilter('premium',this)">💎 Premium</button>
        <button class="fchip"                     onclick="setFilter('zavrseni',this)">✔️ Završeni</button>
    </div>

    <!-- SORT BAR -->
    <div class="sort-bar fu">
        <span class="sort-label">Sortiraj:</span>
        <button class="sort-btn active" id="sort-time"     onclick="setSort('time',this)">🕐 Vrijeme <span class="sort-arrow" id="arr-time">↑</span></button>
        <button class="sort-btn"        id="sort-prize"    onclick="setSort('prize',this)">💰 Nagrada <span class="sort-arrow" id="arr-prize">↓</span></button>
        <button class="sort-btn"        id="sort-players"  onclick="setSort('players',this)">👥 Igrači <span class="sort-arrow" id="arr-players">↓</span></button>
        <button class="sort-btn"        id="sort-name"     onclick="setSort('name',this)">🔤 Naziv <span class="sort-arrow" id="arr-name">↑</span></button>
    </div>

    <!-- LIST -->
    <div class="sec-title fu" id="list-title">📋 Popis Kvizova</div>
    <div id="quiz-list">
        <div class="empty-state">
            <div class="spinner"></div>
            <div class="empty-text">Učitavam kvizove...</div>
        </div>
    </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal open" id="modal">
        <div class="modal-handle"></div>
        <div class="modal-head"><div class="modal-title" id="modal-title">Kviz</div></div>
        <div class="modal-body">
            <div class="quiz-detail-grid" id="modal-detail-grid"></div>
            <div id="modal-content"></div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
const playerProfileId = sessionStorage.getItem('playerProfileId');
const playerProfile   = JSON.parse(sessionStorage.getItem('playerProfile') || 'null');
const TYPE_ICON  = { sata:'🕐', dana:'🌙', tjedna:'📆', mjeseca:'🗓️', premium:'💎' };
const TYPE_CLASS = { sata:'qi-sata', dana:'qi-dana', tjedna:'qi-tjedna', mjeseca:'qi-mjeseca', premium:'qi-premium' };

let allQuizzes = [], activeFilter = 'sve', openQuiz = null, cdTimers = {};
let activeSort = 'time', sortDir = { time:'asc', prize:'desc', players:'desc', name:'asc' };

window.onload = function() { loadStats(); loadQuizzes(); };

function loadStats() {}

function updateStats() {
    const now = Date.now();
    const live    = allQuizzes.filter(q => isLive(q)).length;
    const uskoro  = allQuizzes.filter(q => !isLive(q) && !isFinished(q) && getTime(q) > now).length;
    const prijava = allQuizzes.filter(q => isRegistered(q)).length;
    const ukupno  = allQuizzes.length;
    const el = id => document.getElementById(id);
    if (el('statLive'))    el('statLive').textContent    = live;
    if (el('statUskoro'))  el('statUskoro').textContent  = uskoro;
    if (el('statPrijava')) el('statPrijava').textContent = prijava;
    if (el('statUkupno'))  el('statUkupno').textContent  = ukupno;
}

function setSort(key, el) {
    if (activeSort === key) {
        sortDir[key] = sortDir[key] === 'asc' ? 'desc' : 'asc';
    } else {
        activeSort = key;
    }
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    // Update arrows
    ['time','prize','players','name'].forEach(k => {
        const a = document.getElementById('arr-' + k);
        if (a) a.textContent = sortDir[k] === 'asc' ? '↑' : '↓';
    });
    renderQuizzes();
}

function loadQuizzes() {
    function merge() {
        Promise.all([
            database.ref('quizzes').once('value'),
            database.ref('scheduledQuizzes').once('value')
        ]).then(([s1, s2]) => {
            const d1 = s1.val() || {};
            const d2 = s2.val() || {};
            console.log('quizzes node:', Object.keys(d1).length, 'items');
            console.log('scheduledQuizzes node:', Object.keys(d2).length, 'items');
            allQuizzes = Object.entries({...d2, ...d1}).map(([id,q]) => ({id,...q}));
            console.log('allQuizzes total:', allQuizzes.length);
            allQuizzes.sort((a,b) => {
                if (isLive(a) && !isLive(b)) return -1;
                if (!isLive(a) && isLive(b)) return 1;
                return (getTime(a)||0) - (getTime(b)||0);
            });
            renderQuizzes();
            updateStats();
        }).catch(err => console.error('loadQuizzes error:', err));
    }
    merge();
    // Realtime updates
    database.ref('quizzes').on('value', () => merge());
    database.ref('scheduledQuizzes').on('value', () => merge());
}

function isLive(q){ return q.status==='live'||q.status==='active'||q.isActive===true; }
function isFinished(q){ return q.status==='finished'||q.status==='completed'; }
function getTime(q){ return q.scheduledTime||q.startTime||0; }
function isRegistered(q){ return !!(playerProfile?.registeredQuizzes?.[q.id]); }

function setFilter(f, el) {
    activeFilter = f;
    document.querySelectorAll('.fchip').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderQuizzes();
}

function renderQuizzes() {
    const search = document.getElementById('search-input').value.toLowerCase().trim();
    const now = Date.now();
    let list = allQuizzes.filter(q => {
        if (search && !((q.name||'').toLowerCase().includes(search)||(q.type||'').toLowerCase().includes(search))) return false;
        switch(activeFilter) {
            case 'live':        return isLive(q);
            case 'nadolazeci':  return !isLive(q)&&!isFinished(q)&&getTime(q)>now;
            case 'prijavljeni': return isRegistered(q);
            case 'zavrseni':    return isFinished(q);
            case 'sve':         return true;
            default:            return (q.type||'').toLowerCase()===activeFilter;
        }
    });

    // Sortiraj — live uvijek gore
    list.sort((a, b) => {
        if (isLive(a) && !isLive(b)) return -1;
        if (!isLive(a) && isLive(b)) return 1;
        const dir = sortDir[activeSort] === 'asc' ? 1 : -1;
        switch (activeSort) {
            case 'time':    return ((getTime(a)||0) - (getTime(b)||0)) * dir;
            case 'prize':   return ((a.prizePool||0) - (b.prizePool||0)) * dir;
            case 'players': return ((a.playerCount||0) - (b.playerCount||0)) * dir;
            case 'name':    return (a.name||'').localeCompare(b.name||'','hr') * dir;
            default:        return 0;
        }
    });

    const titles = { sve:'📋 Popis Kvizova', live:'🔴 Uživo', nadolazeci:'📅 Nadolazeći Kvizovi', prijavljeni:'✅ Moji Prijavljeni', zavrseni:'✔️ Završeni', sata:'🕐 Kviz Sata', dana:'🌙 Kviz Dana', tjedna:'📆 Kviz Tjedna', mjeseca:'🗓️ Kviz Mjeseca', premium:'💎 Premium' };
    document.getElementById('list-title').textContent = titles[activeFilter]||'📋 Kvizovi';

    Object.values(cdTimers).forEach(clearInterval); cdTimers = {};

    if (!list.length) {
        document.getElementById('quiz-list').innerHTML =
            '<div class="empty-state fu"><div class="empty-icon">🎮</div><div class="empty-text">'
            +(search?'Nema rezultata za "'+esc(search)+'"':activeFilter==='live'?'Nema aktivnih kvizova':activeFilter==='prijavljeni'?'Nisi prijavljen ni na jedan kviz':'Nema kvizova za odabrani filter')
            +'</div></div>';
        return;
    }

    document.getElementById('quiz-list').innerHTML = list.map(q => quizItemHTML(q)).join('');

    list.forEach(q => {
        if (!isLive(q)&&!isFinished(q)&&getTime(q)>now) {
            const el = document.getElementById('cd-'+q.id);
            if (!el) return;
            cdTimers[q.id] = setInterval(() => {
                const diff = getTime(q)-Date.now();
                if (diff<=0){ clearInterval(cdTimers[q.id]); el.textContent='Kreće uskoro!'; return; }
                el.textContent = fmtCd(diff);
            }, 1000);
        }
    });
}

function quizItemHTML(q) {
    const live=isLive(q), fin=isFinished(q), reg=isRegistered(q);
    const now=Date.now(), t=getTime(q);
    const type=(q.type||'').toLowerCase();
    const icon=TYPE_ICON[type]||'🎮';
    const iClass=live?'qi-live':(TYPE_CLASS[type]||'qi-default');
    const timeStr=t?new Date(t).toLocaleString('hr-HR',{weekday:'short',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
    const badge=live
        ?'<span class="quiz-badge qb-live"><span class="live-dot-r"></span>UŽIVO</span>'
        :fin?'<span class="quiz-badge qb-fin">ZAVRŠENO</span>'
        :'<span class="quiz-badge qb-sched">ZAKAZANO</span>';
    const diff=t-now;
    const urgent=(!live&&!fin&&diff>0&&diff<3600000);
    const cdHTML=(!live&&!fin&&t>now)
        ?'<div class="cd-wrap'+(urgent?' cd-urgent':'')+'" id="cd-'+q.id+'">'+fmtCd(diff)+'</div>'
        :'';
    const pills=[
        q.prizePool?'<span class="qpill gold">🏆 '+q.prizePool+' tok</span>':'',
        q.entryFee?'<span class="qpill">🎟️ '+q.entryFee+' tok</span>':'<span class="qpill green">🆓 Besplatno</span>',
        q.maxPlayers?'<span class="qpill blue">👥 max '+q.maxPlayers+'</span>':'',
        q.questionCount?'<span class="qpill">❓ '+q.questionCount+' pit.</span>':'',
        q.rounds!=null?'<span class="qpill">🔄 '+q.rounds+' rundi</span>':'',
        q.category?'<span class="qpill">📂 '+esc(q.category)+'</span>':'',
        reg?'<span class="qpill green">✅ Prijavljen</span>':'',
    ].filter(Boolean).join('');
    const btnClass=live?'live-btn':fin?'fin-btn':reg?'reg-btn':'join-btn';
    const btnText=live?'⚡ ULAZ!':fin?'📊 Rezultati':reg?'✅ Prijavljen':'🎟️ Prijavi se';
    return '<div class="quiz-item '+iClass+' fu'+(live?' qlive':'')+(fin?' qfin':'')+'" onclick="openQuizModal(\'+q.id+\')">'
        +'<div class="quiz-band"></div>'
        +'<div class="quiz-head">'
        +'<div class="quiz-type-icon">'+icon+'</div>'
        +'<div class="quiz-info">'
        +'<div class="quiz-name">'+esc(q.name||'Kviz')+'</div>'
        +'<div class="quiz-time">'+timeStr+'</div>'
        +'<div class="quiz-pills">'+pills+'</div>'
        +'</div>'
        +'<div class="cd-block">'+cdHTML+badge+'</div>'
        +'</div>'
        +'<div class="quiz-foot">'
        +'<div class="quiz-foot-stats">'
        +(q.playerCount!=null?'<span>👥 '+q.playerCount+'</span>':'')
        +'</div>'
        +'<button class="btn-join '+btnClass+'" onclick="event.stopPropagation();quickAction(\'+q.id+\')">'+btnText+'</button>'
        +'</div></div>';
}

function fmtCd(ms) {
    if (ms<=0) return 'Kreće uskoro!';
    const totalS=Math.floor(ms/1000);
    const d=Math.floor(totalS/86400);
    const h=Math.floor((totalS%86400)/3600);
    const m=Math.floor((totalS%3600)/60);
    const s=totalS%60;
    if (d>0) return d+'d '+(h>0?h+'h':'');
    if (h>0) return h+'h '+m+'m';
    return m+'m '+s+'s';
}

function openQuizModal(id) {
    openQuiz = allQuizzes.find(q=>q.id===id); if(!openQuiz) return;
    const q=openQuiz, live=isLive(q), fin=isFinished(q), reg=isRegistered(q), t=getTime(q);
    document.getElementById('modal-title').textContent=(TYPE_ICON[q.type]||'🎮')+' '+(q.name||'Kviz');
    const ts=t?new Date(t).toLocaleString('hr-HR',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
    document.getElementById('modal-detail-grid').innerHTML=
        cell('🏆 '+(q.prizePool||0)+' tok','Nagradni fond')+
        cell('🎟️ '+(q.entryFee?q.entryFee+' tok':'Besplatno'),'Kotizacija')+
        cell('👥 '+(q.maxPlayers||'∞'),'Max igrača')+
        cell('❓ '+(q.questionCount||10),'Pitanja');
    let html='';
    if (q.description) html+='<div style="font-size:.88rem;color:#6b7280;line-height:1.6;margin-bottom:12px;background:var(--brand-pale);border-radius:10px;padding:10px 12px;">'+esc(q.description)+'</div>';
    html+='<div style="font-family:\'Metal Mania\',cursive;font-size:.78rem;color:#9ca3af;margin-bottom:12px;">📅 '+ts+'</div>';
    if (live) {
        html+='<button class="btn-primary" style="background:linear-gradient(135deg,#a7f3d0,#10b981);" onclick="joinLive()">⚡ Ulazi u igru ODMAH!</button>';
    } else if (fin) {
        html+='<button class="btn-primary" style="background:#9ca3af;cursor:default;">✔️ Kviz je završen</button>';
    } else if (reg) {
        html+='<div style="background:#d1fae5;border:1.5px solid #a7f3d0;border-radius:11px;padding:10px 14px;font-family:\'Metal Mania\',cursive;font-size:.85rem;color:#065f46;margin-bottom:10px;">✅ Već si prijavljen!</div>';
        html+='<button class="btn-cancel" onclick="closeModalDirect()">Zatvori</button>';
    } else if (q.entryFee) {
        const bal=playerProfile?.stats?.tokenBalance||0, can=bal>=q.entryFee;
        html+='<div style="background:var(--brand-pale);border:1.5px solid var(--brand-light);border-radius:11px;padding:10px 14px;margin-bottom:12px;">'
            +'<div style="font-family:\'Metal Mania\',cursive;font-size:.8rem;color:var(--brand-dark);">Tvoji tokeni: <strong style="color:var(--brand);">'+bal+'</strong></div>'
            +'<div style="font-size:.75rem;color:#9ca3af;margin-top:2px;">Kotizacija: '+q.entryFee+' tokena</div></div>';
        if (can) html+='<button class="btn-primary" onclick="registerWithTokens()">🎟️ Plati '+q.entryFee+' tokena i prijavi se</button>';
        else      html+='<button class="btn-primary" style="opacity:.4;cursor:not-allowed;" disabled>❌ Nedovoljno tokena</button>';
        html+='<button class="btn-cancel" onclick="closeModalDirect()">Odustani</button>';
    } else {
        html+='<label class="m-label">Šifra kviza (ako je potrebna)</label>';
        html+='<input type="text" class="m-input" id="quiz-password" placeholder="- - - -" maxlength="12">';
        html+='<button class="btn-primary" onclick="registerWithPassword()">🎟️ Prijavi se</button>';
        html+='<button class="btn-cancel" onclick="closeModalDirect()">Odustani</button>';
    }
    document.getElementById('modal-content').innerHTML=html;
    document.getElementById('modal-overlay').classList.add('open');
}

function cell(val,lbl){ return '<div class="qdg-cell"><div class="qdg-val">'+esc(val)+'</div><div class="qdg-lbl">'+lbl+'</div></div>'; }
function quickAction(id){ const q=allQuizzes.find(x=>x.id===id); if(!q)return; if(isLive(q)){joinLiveById(id);return;} openQuizModal(id); }
function joinLive(){ if(openQuiz) joinLiveById(openQuiz.id); }
function joinLiveById(id){ sessionStorage.setItem('currentQuizId',id); window.location.href='player.html'; }

function registerWithPassword() {
    const pw=(document.getElementById('quiz-password')?.value||'').trim(), q=openQuiz;
    if (!q||!playerProfileId){toast('❌ Nisi prijavljen!');return;}
    database.ref('settings/password').once('value').then(snap=>{
        const c=snap.val();
        if (c&&pw!==c){toast('❌ Pogrešna šifra!');return;}
        doRegister(q);
    });
}
function registerWithTokens() {
    const q=openQuiz; if(!q||!playerProfileId)return;
    const bal=playerProfile?.stats?.tokenBalance||0;
    if (bal<q.entryFee){toast('❌ Nedovoljno tokena!');return;}
    const nb=bal-q.entryFee;
    database.ref('playerProfiles/'+playerProfileId+'/stats/tokenBalance').set(nb).then(()=>{
        if(playerProfile){if(!playerProfile.stats)playerProfile.stats={};playerProfile.stats.tokenBalance=nb;sessionStorage.setItem('playerProfile',JSON.stringify(playerProfile));}
        doRegister(q);
    });
}
function doRegister(q) {
    database.ref('playerProfiles/'+playerProfileId+'/registeredQuizzes/'+q.id).set(Date.now()).then(()=>{
        if(playerProfile){if(!playerProfile.registeredQuizzes)playerProfile.registeredQuizzes={};playerProfile.registeredQuizzes[q.id]=Date.now();sessionStorage.setItem('playerProfile',JSON.stringify(playerProfile));}
        toast('✅ Prijavljen na '+esc(q.name||'kviz')+'!');
        closeModalDirect(); renderQuizzes();
    }).catch(err=>toast('❌ Greška: '+err.message));
}
function closeModal(e){ if(e.target===document.getElementById('modal-overlay')) closeModalDirect(); }
function closeModalDirect(){ document.getElementById('modal-overlay').classList.remove('open'); openQuiz=null; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
</script>
</body>
</html>
