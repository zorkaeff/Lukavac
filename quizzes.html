<!DOCTYPE html>
<!-- Quizzes List - 2026-01-27 -->
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kvizovi - Lukavac</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tillana:wght@400;700&family=Metal+Mania&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tillana', cursive; background: linear-gradient(135deg, #fffff1 0%, #ffd995 100%); }
        .card { background: white; border-radius: 20px; box-shadow: 0 8px 32px rgba(183, 88, 0, 0.2); }
        :root { --brand:#b75800; --brand-dark:#632705; --brand-light:#ffd995; --brand-pale:#fffff1; }
        .quiz-card { border-radius:15px; overflow:hidden; margin-bottom:10px; cursor:pointer; transition:all .22s; box-shadow:0 3px 12px rgba(183,88,0,.12); }
        .quiz-card:hover { transform:translateY(-3px); box-shadow:0 10px 26px rgba(183,88,0,.28); }
        .quiz-card-live { box-shadow:0 3px 12px rgba(16,185,129,.18); }
        .quiz-card-live:hover { box-shadow:0 10px 26px rgba(16,185,129,.32); }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.85} }
        .live-pulse { animation:pulse 2s infinite; }
        .badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:.75rem; font-weight:bold; }
        .badge-live { background: #ef4444; color: white; }
        .badge-scheduled { background: #3b82f6; color: white; }
        .badge-finished { background: #6b7280; color: white; }
        .filter-wrap{background:white;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:10px 12px;margin-bottom:10px;}
        .filter-chips{display:flex;flex-wrap:wrap;gap:5px;}
        .chip{padding:5px 13px;border-radius:20px;border:1.5px solid var(--brand-light);background:var(--brand-pale);font-family:'Metal Mania',cursive;font-size:.74rem;color:var(--brand-dark);cursor:pointer;transition:all .18s;white-space:nowrap;}
        .chip:hover{border-color:var(--brand);background:var(--brand-light);}
        .chip.active{background:linear-gradient(135deg,var(--brand-light),var(--brand));color:white;border-color:var(--brand);box-shadow:0 3px 8px rgba(183,88,0,.25);}
        .chip.c-live.active{background:linear-gradient(135deg,#d1fae5,#059669);border-color:#059669;}
        .chip.c-zakazano.active{background:linear-gradient(135deg,#dbeafe,#3b82f6);border-color:#3b82f6;}
        .chip.c-zavrseno.active{background:linear-gradient(135deg,#f3f4f6,#6b7280);border-color:#6b7280;color:white;}
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-6 max-w-6xl">
        <!-- Header -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <span style="font-family:'Metal Mania',cursive;font-size:1.1rem;color:var(--brand);">🎮 Svi Kvizovi</span>
            <button onclick="window.location.href='dashboard.html'"
                    style="background:transparent;border:1.5px solid var(--brand-light);border-radius:10px;
                           padding:5px 12px;font-family:'Metal Mania',cursive;font-size:.75rem;
                           color:var(--brand-dark);cursor:pointer;">
                ← Dashboard
            </button>
        </div>

        <!-- Filters -->
        <div class="filter-wrap">
            <div class="filter-chips">
                <button class="chip active"        onclick="filterQuizzes('all',this)">📋 Svi</button>
                <button class="chip c-live"        onclick="filterQuizzes('live',this)">🔴 Uživo</button>
                <button class="chip c-zakazano"    onclick="filterQuizzes('scheduled',this)">📅 Zakazano</button>
                <button class="chip c-zavrseno"    onclick="filterQuizzes('finished',this)">✅ Završeno</button>
                <button class="chip"               onclick="filterQuizzes('sata',this)">🕐 Sata</button>
                <button class="chip"               onclick="filterQuizzes('dana',this)">🌙 Dana</button>
                <button class="chip"               onclick="filterQuizzes('noci',this)">🌃 Noći</button>
                <button class="chip"               onclick="filterQuizzes('premium',this)">💎 Premium</button>
                <button class="chip"               onclick="filterQuizzes('tjedna',this)">📅 Tjedna</button>
                <button class="chip"               onclick="filterQuizzes('mjeseca',this)">📆 Mjeseca</button>
            </div>
        </div>

        <!-- Quizzes Grid -->
        <div id="quizzes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="text-gray-500">Učitavam kvizove...</p>
        </div>
    </div>

    <script>
        let allQuizzes = [];
        let currentFilter = 'all';

        window.onload = function() {
            loadQuizzes();
        };

        function loadQuizzes() {
            database.ref('scheduledQuizzes').on('value', snap => {
                const quizzes = snap.val() || {};
                allQuizzes = Object.entries(quizzes).map(([id, data]) => ({id, ...data}));
                allQuizzes.sort((a, b) => a.startTime - b.startTime);
                displayQuizzes();
            });
        }

        function displayQuizzes() {
            const filtered = currentFilter === 'all' ? allQuizzes :
                           currentFilter === 'live' ? allQuizzes.filter(q => q.status === 'live') :
                           currentFilter === 'scheduled' ? allQuizzes.filter(q => q.status === 'scheduled') :
                           allQuizzes.filter(q => q.type === currentFilter);

            let html = '';
            const now = Date.now();

            filtered.forEach(quiz => {
                const isLive = quiz.status === 'live';
                const isScheduled = quiz.startTime > now && quiz.status === 'scheduled';
                const isFinished = quiz.status === 'finished';

                const badge = isLive ? '<span class="badge badge-live">🔴 UŽIVO</span>' :
                             isScheduled ? '<span class="badge badge-scheduled">📅 ZAKAZANO</span>' :
                             '<span class="badge badge-finished">✅ ZAVRŠENO</span>';

                const startDate = new Date(quiz.startTime);
                const timeStr = startDate.toLocaleString('hr-HR', {
                    weekday: 'short',
                    day: '2-digit',
                    month: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                const cardClass = isLive ? 'quiz-card quiz-live' : 'quiz-card';
                const typeIcon = quiz.type === 'sata' ? '🕐' : quiz.type === 'dana' ? '🌙' : 
                               quiz.type === 'noci' ? '🌃' : quiz.type === 'premium' ? '💎' : 
                               quiz.type === 'tjedna' ? '📅' : '📆';

                const safeName = (quiz.name||'Kviz').replace(/[^a-zA-Z0-9čćžšđČĆŽŠĐ ]/g,' ').trim();
                const rounds   = quiz.rounds || quiz.totalRounds || '—';
                const qPerR    = quiz.questionsPerRound || '—';
                const maxP     = quiz.maxPlayers || '—';
                const timeA    = (quiz.roundSettings && quiz.roundSettings[0] && quiz.roundSettings[0].timeAnswer) || quiz.timeAnswer || 20;
                const tokenCost = quiz.tokenCost ?? quiz.entryFee ?? 0;

                // countdown string
                const msTill = quiz.startTime - now;
                let cdStr = '';
                if (isLive) {
                    cdStr = '🔴 UŽIVO';
                } else if (isFinished) {
                    cdStr = '✅ ZAVRŠENO';
                } else if (msTill > 0) {
                    const d = Math.floor(msTill/86400000);
                    const h = Math.floor((msTill%86400000)/3600000);
                    const m = Math.floor((msTill%3600000)/60000);
                    const s = Math.floor((msTill%60000)/1000);
                    cdStr = d>0 ? d+'D '+h+'h '+m+'m' : h>0 ? h+'h '+m+'m '+s+'s' : m>0 ? m+'m '+s+'s' : s+'s';
                } else {
                    cdStr = timeStr;
                }

                // card colours
                const isGreen = isLive;
                const borderCol = isGreen ? '#10b981' : isFinished ? '#9ca3af' : 'var(--brand)';
                const bgGrad    = isGreen ? 'linear-gradient(135deg,#f0fdf4,#d1fae5)'
                                : isFinished ? 'linear-gradient(135deg,#f9fafb,#f3f4f6)'
                                : 'linear-gradient(135deg,var(--brand-pale),#fff8e6)';
                const titleCol  = isGreen ? '#065f46' : isFinished ? '#6b7280' : 'var(--brand-dark)';
                const subBorder = isGreen ? '#a7f3d0' : isFinished ? '#e5e7eb' : 'var(--brand-light)';
                const cdBg      = isGreen ? '#10b981' : isFinished ? '#9ca3af' : 'var(--brand)';
                const cardExtra = isGreen ? 'quiz-card-live live-pulse' : '';

                // action row
                const actionRow = isLive
                    ? `<button onclick="event.stopPropagation();joinQuiz('${quiz.id}',false)"
                               style="background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;
                                      border-radius:10px;padding:8px 0;font-family:'Metal Mania',cursive;
                                      font-size:.88rem;cursor:pointer;flex:1;text-align:center;">
                           ⚡ PRIDRUŽI SE ODMAH!
                       </button>`
                    : isFinished
                    ? `<button onclick="event.stopPropagation();joinQuiz('${quiz.id}',true)"
                               style="background:transparent;border:1.5px solid #9ca3af;color:#6b7280;
                                      border-radius:10px;padding:7px 14px;font-family:'Metal Mania',cursive;
                                      font-size:.82rem;cursor:pointer;flex:1;text-align:center;">
                           📊 Vidi rezultate
                       </button>`
                    : `<button onclick="event.stopPropagation();joinQuiz('${quiz.id}',false)"
                               style="background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:white;
                                      border:none;border-radius:10px;padding:8px 0;font-family:'Metal Mania',cursive;
                                      font-size:.88rem;cursor:pointer;flex:1;text-align:center;">
                           🎮 PRIJAVI SE
                       </button>`;

                html += `
                <div class="quiz-card ${cardExtra}"
                     style="background:${bgGrad};border:2px solid ${borderCol};"
                     onclick="joinQuiz('${quiz.id}',${isFinished})">
                    <!-- ROW 1: naziv + countdown -->
                    <div style="display:flex;justify-content:space-between;align-items:center;
                                padding:12px 14px 10px;border-bottom:2px solid ${borderCol};">
                        <span style="font-family:'Metal Mania',cursive;font-size:1.05rem;color:${titleCol};">
                            ${typeIcon} ${quiz.name||'Kviz'}
                        </span>
                        <span style="background:${cdBg};color:${isFinished?'white':'#ffd995'};border-radius:20px;
                                     padding:4px 12px;font-family:'Metal Mania',cursive;font-size:.78rem;
                                     white-space:nowrap;" id="qcd-${quiz.id}">
                            ${cdStr}
                        </span>
                    </div>
                    <!-- ROW 2: 4-col info -->
                    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:4px;
                                padding:9px 14px;border-bottom:1px solid ${subBorder};">
                        <span style="font-family:'Metal Mania',cursive;font-size:.78rem;color:${titleCol};text-align:center;">
                            👥 ${quiz.playerCount||0}/${maxP}
                        </span>
                        <span style="font-family:'Metal Mania',cursive;font-size:.78rem;color:${titleCol};text-align:center;">
                            🎟️ ${tokenCost}
                        </span>
                        <span style="font-family:'Metal Mania',cursive;font-size:.78rem;color:${titleCol};text-align:center;">
                            🔄 ${rounds}×${qPerR}
                        </span>
                        <span style="font-family:'Metal Mania',cursive;font-size:.78rem;color:${titleCol};text-align:center;">
                            ⏱ ${timeA}s
                        </span>
                        <span style="font-family:'Metal Mania',cursive;font-size:.78rem;text-align:center;grid-column:span 1;color:${quiz.locked===false?'#10b981':'#f59e0b'};">
                            ${quiz.locked===false ? '🔓 Otključan' : '🔐 Šifra'}
                        </span>
                    </div>
                    <!-- ROW 3: akcija -->
                    <div style="display:flex;gap:7px;padding:9px 14px;align-items:center;flex-wrap:wrap;">
                        ${actionRow}
                    </div>
                </div>`;
            });

            document.getElementById('quizzes-grid').innerHTML = html || '<p class="text-gray-500 col-span-full text-center">Nema kvizova za prikaz</p>';
            startCountdowns();
        }

        let cdInterval = null;
        function startCountdowns() {
            if (cdInterval) clearInterval(cdInterval);
            cdInterval = setInterval(() => {
                const now = Date.now();
                allQuizzes.forEach(quiz => {
                    const el = document.getElementById('qcd-' + quiz.id);
                    if (!el) return;
                    if (quiz.status === 'live') { el.textContent = '🔴 UŽIVO'; return; }
                    if (quiz.status === 'finished') { el.textContent = '✅ ZAVRŠENO'; return; }
                    const msTill = quiz.startTime - now;
                    if (msTill <= 0) { el.textContent = '—'; return; }
                    const d = Math.floor(msTill/86400000);
                    const h = Math.floor((msTill%86400000)/3600000);
                    const m = Math.floor((msTill%3600000)/60000);
                    const s = Math.floor((msTill%60000)/1000);
                    el.textContent = d>0 ? d+'D '+h+'h '+m+'m' : h>0 ? h+'h '+m+'m '+s+'s' : m>0 ? m+'m '+s+'s' : s+'s';
                });
            }, 1000);
        }

        function filterQuizzes(type, el) {
            currentFilter = type;
            document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
            if (el) el.classList.add('active');
            displayQuizzes();
        }

        function joinQuiz(quizId, isFinished) {
            if (isFinished) {
                window.location.href = `quiz-results.html?id=${quizId}`;
                return;
            }

            // Check if quiz is locked
            database.ref('scheduledQuizzes/' + quizId).once('value').then(snap => {
                const quiz = snap.val();
                if (!quiz) { alert('Kviz nije pronađen.'); return; }

                if (quiz.locked === false) {
                    // Unlocked — join directly
                    doJoinQuiz(quizId, quiz);
                } else {
                    // Locked — ask for password
                    const password = prompt('🔐 Unesi šifru kviza:');
                    if (!password) return;
                    database.ref('settings/password').once('value').then(snap => {
                        const correctPassword = snap.val();
                        if (password !== correctPassword) {
                            alert('❌ Pogrešna šifra kviza!');
                            return;
                        }
                        doJoinQuiz(quizId, quiz);
                    });
                }
            });
        }

        function doJoinQuiz(quizId, quiz) {
                // Online (auto-mode) kviz → idi na lobby koji radi sav join flow
                // (upis u /liveQuizzes/{id}/lobby umjesto u globalni /players).
                const mode = quiz.mode || 'auto'; // default: auto
                if (mode === 'auto') {
                    window.location.href = 'lobby.html?quiz=' + quizId;
                    return;
                }

                // Studio mode (uživo, admin.html) — stari flow
                // Password correct - join game
                const profileId = sessionStorage.getItem('playerProfileId');
                const profile = JSON.parse(sessionStorage.getItem('playerProfile'));
                
                if (!profileId || !profile) {
                    alert('⚠️ Nisi prijavljen! Redirectam na login...');
                    window.location.href = 'login.html';
                    return;
                }
                
                // Add player to game
                const displayName = profile.nickname || profile.firstName || 'Igrač';
                database.ref(`players/${profileId}`).set({
                    name: displayName,
                    score: 0,
                    lukavacCount: 0,
                    exclamationCount: 0,
                    totalTime: 0,
                    joinedAt: Date.now(),
                    profileId: profileId,
                    rating: profile.stats?.averageRating || 0
                }).then(() => {
                    sessionStorage.setItem('currentQuizId', quizId);
                    window.location.href = 'player.html';
                });
                
            }).catch(error => {
                alert('❌ Greška pri provjeri šifre: ' + error.message);
            });
        }
    </script>
</body>
</html>
